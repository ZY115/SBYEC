<!-- SBYEC Chatbot Widget - Copy this entire block into your website -->

<div id="sbyec-chat-card" onclick="toggleSBYECChat()">
  <span class="sbyec-card-icon">&#x1f40e;</span>
  <div class="sbyec-card-text">
    <strong>Need help?</strong>
    <span>Ask SBYEC Chatbot</span>
  </div>
  <span class="sbyec-card-arrow">&#x25B2;</span>
</div>

<div id="sbyec-chat-window">
  <div class="sbyec-chat-header">
    <div class="sbyec-header-left">
      <span class="sbyec-header-icon">&#x1f40e;</span>
      <div>
        <div class="sbyec-header-title">SBYEC Chatbot</div>
        <div class="sbyec-header-status">
          <span class="sbyec-status-dot"></span> Online
        </div>
      </div>
    </div>
    <button class="sbyec-close-btn" onclick="toggleSBYECChat()" aria-label="Close">&times;</button>
  </div>
  <div class="sbyec-chat-body">
    <iframe
      id="sbyec-iframe"
      src="about:blank"
      data-src="https://yhz999-sbyec-chatbot.hf.space"
      style="width:100%; height:100%; border:none;"
      loading="lazy"
    ></iframe>
  </div>
  <div class="sbyec-chat-footer">
    Powered by SBYEC AI &bull; Silver Buckle Youth Equestrian Center
  </div>
</div>

<style>
  /* --- Floating Card Button --- */
  #sbyec-chat-card {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #2b6cb0, #1a4f8b);
    color: white;
    padding: 12px 18px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(43, 108, 176, 0.4);
    z-index: 9999;
    transition: all 0.3s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    user-select: none;
  }
  #sbyec-chat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(43, 108, 176, 0.5);
  }
  .sbyec-card-icon {
    font-size: 26px;
    line-height: 1;
  }
  .sbyec-card-text {
    display: flex;
    flex-direction: column;
    font-size: 13px;
    line-height: 1.3;
  }
  .sbyec-card-text strong {
    font-size: 14px;
  }
  .sbyec-card-arrow {
    font-size: 10px;
    opacity: 0.7;
    transition: transform 0.3s ease;
  }

  /* --- Chat Window --- */
  #sbyec-chat-window {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 400px;
    height: 560px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 10000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    animation: sbyecSlideUp 0.3s ease;
  }
  @keyframes sbyecSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .sbyec-chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #2b6cb0, #1a4f8b);
    color: white;
    padding: 14px 16px;
  }
  .sbyec-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sbyec-header-icon {
    font-size: 28px;
    line-height: 1;
  }
  .sbyec-header-title {
    font-weight: 600;
    font-size: 15px;
  }
  .sbyec-header-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    opacity: 0.85;
  }
  .sbyec-status-dot {
    width: 7px;
    height: 7px;
    background: #48bb78;
    border-radius: 50%;
    display: inline-block;
  }
  .sbyec-close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .sbyec-close-btn:hover {
    opacity: 1;
  }

  /* Body (iframe) */
  .sbyec-chat-body {
    flex: 1;
    overflow: hidden;
  }

  /* Footer */
  .sbyec-chat-footer {
    text-align: center;
    font-size: 11px;
    color: #888;
    padding: 8px;
    background: #fafafa;
    border-top: 1px solid #eee;
  }

  /* --- Mobile Responsive --- */
  @media (max-width: 480px) {
    #sbyec-chat-window {
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border-radius: 0;
    }
    #sbyec-chat-card {
      right: 12px;
      bottom: 12px;
    }
  }
</style>

<script>
  (function() {
    var chatOpen = false;
    var iframeLoaded = false;

    window.toggleSBYECChat = function() {
      var card = document.getElementById("sbyec-chat-card");
      var win  = document.getElementById("sbyec-chat-window");

      if (!chatOpen) {
        // Lazy-load iframe on first open
        if (!iframeLoaded) {
          var iframe = document.getElementById("sbyec-iframe");
          iframe.src = iframe.getAttribute("data-src");
          iframeLoaded = true;
        }
        card.style.display = "none";
        win.style.display = "flex";
        chatOpen = true;
      } else {
        win.style.display = "none";
        card.style.display = "flex";
        chatOpen = false;
      }
    };
  })();
</script>
